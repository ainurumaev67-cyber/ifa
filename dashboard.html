<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFA — Панель управления</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <h1>Настройка виджета</h1>
        <p id="user-info"></p>

        <label>Цвет кнопки:</label>
        <input type="color" id="btn-color" value="#6C63FF">

        <label>Текст кнопки:</label>
        <input type="text" id="btn-text" value="💬">

        <label>Ширина окна (px):</label>
        <input type="number" id="win-width" value="380">

        <label>Высота окна (px):</label>
        <input type="number" id="win-height" value="500">

        <h3>Ваш скрипт для вставки:</h3>
        <textarea id="script-output" rows="6" readonly></textarea>
        <button id="copy-btn">Скопировать</button>

        <button id="logout-btn">Выйти</button>
    </div>
    <script type="module" src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
