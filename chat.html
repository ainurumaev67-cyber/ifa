<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFA Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f9f9f9; }
        #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 80%; word-wrap: break-word; font-size: 14px; line-height: 1.4; }
        .user { background: #6C63FF; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: #e8e8e8; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: #fff; }
        #input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; }
        #send { margin-left: 8px; padding: 10px 16px; background: #6C63FF; color: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="input" placeholder="Задайте вопрос...">
        <button id="send">Отправить</button>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        const STORAGE_KEY = 'ifa_chat_history';

        function loadHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                JSON.parse(saved).forEach(msg => addMessage(msg.text, msg.role));
            }
        }

        function saveMessage(text, role) {
            const saved = localStorage.getItem(STORAGE_KEY);
            const history = saved ? JSON.parse(saved) : [];
            history.push({ text, role });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function addMessage(text, role) {
            const msg = document.createElement('div');
            msg.className = 'msg ' + role;
            msg.textContent = text;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function askAI(question) {
            addMessage(question, 'user');
            saveMessage(question, 'user');
            input.value = '';

            const placeholder = document.createElement('div');
            placeholder.className = 'msg bot';
            placeholder.textContent = '...';
            messagesDiv.appendChild(placeholder);

            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: question })
                });
                const data = await response.json();
                placeholder.remove();
                addMessage(data.reply, 'bot');
                saveMessage(data.reply, 'bot');
            } catch (e) {
                placeholder.remove();
                addMessage('Ошибка соединения.', 'bot');
            }
        }

        sendBtn.addEventListener('click', () => {
            const q = input.value.trim();
            if (q) askAI(q);
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const q = input.value.trim();
                if (q) askAI(q);
            }
        });

        loadHistory();
    </script>
</body>
</html>
